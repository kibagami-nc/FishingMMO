<section id="skills" class="pt-2 pb-80 relative overflow-visible bg-transparent">
    <div class="skills-title-container" [style.transform]="'translateX(' + (-500 - scrollOffset * 0.6) + 'px)'">
        <h2 class="section-title">
            Compétences Compétences Compétences Compétences Compétences Compétences Compétences Compétences Compétences
            Compétences Compétences Compétences Compétences Compétences Compétences Compétences
        </h2>
    </div>

    <!-- Left Rotating Wheel (Clockwise) -->
    <div class="skill-wheel skill-wheel-left">
        <div class="wheel-orbit orbit-clockwise">
            <div *ngFor="let skill of skills.slice(0, 6); let i = index" class="wheel-item"
                [style.transform]="'rotate(' + (i * 60) + 'deg) translateY(-200px)'"
                (mouseenter)="showTooltip(skill.description, $event, skill.name)" (mouseleave)="hideTooltip()">
                <img [src]="skill.icon" [alt]="skill.name" class="wheel-icon">
            </div>
        </div>
    </div>

    <!-- Right Rotating Wheel (Counter-Clockwise) -->
    <div class="skill-wheel skill-wheel-right">
        <div class="wheel-orbit orbit-counter-clockwise">
            <div *ngFor="let skill of skills.slice(6); let i = index" class="wheel-item"
                [style.transform]="'rotate(' + (i * 90) + 'deg) translateY(-200px)'"
                (mouseenter)="showTooltip(skill.description, $event, skill.name)" (mouseleave)="hideTooltip()">
                <img [src]="skill.icon" [alt]="skill.name" class="wheel-icon">
            </div>
        </div>
    </div>

    <!-- Centered Description Box -->
    <div *ngIf="tooltipVisible" class="skill-description-box" [class.closing]="isClosing">
        <div class="description-content">
            <h3 class="skill-name">{{ tooltipText.split(':')[0] }}</h3>
            <p class="skill-detail">{{ tooltipText.split(':')[1] || tooltipText }}</p>
        </div>
    </div>
</section>
