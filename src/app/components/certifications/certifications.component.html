<section id="certifications" class="py-32 relative">


    <div class="max-w-7xl mx-auto px-6 relative z-10">
        <div class="text-center mb-20 scroll-trigger" appScrollTrigger>
            <h2 class="section-title">
                Certifications
            </h2>
            <p class="section-subtitle">
                Validation continue de mes compétences à travers des parcours reconnus par l'industrie.
            </p>
        </div>

        <div class="cert-grid" (mouseleave)="onGridLeave()">

            <!-- Interactive Overlay -->
            <div class="cert-overlay" [ngStyle]="overlayStyle">
                <div class="overlay-content" *ngIf="hoveredCert">
                    <h4 class="text-white font-bold mb-2">{{hoveredCert.skills ? 'Compétences :' : ''}}</h4>
                    <div class="flex flex-wrap gap-2 justify-center">
                        <span *ngFor="let skill of hoveredCert.skills"
                            class="text-xs bg-white/20 text-white px-2 py-1 rounded">
                            {{skill}}
                        </span>
                    </div>
                </div>
            </div>

            <div *ngFor="let cert of certifications; let i = index" class="cert-card group scroll-trigger"
                appScrollTrigger [style.transition-delay]="(i * 30) + 'ms'" (mouseenter)="onCardHover($event, cert)">
                <!-- Faster stagger -->

                <div class="cert-card-inner">
                    <div class="cert-icon">
                        <img [src]="cert.icon" [alt]="cert.issuer">
                    </div>

                    <div class="cert-content">
                        <span class="cert-issuer">{{cert.issuer}}</span>
                        <h3 class="cert-title">{{cert.title}}</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
