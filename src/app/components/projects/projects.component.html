<section id="projects" class="w-full py-32 relative flex flex-col items-center justify-center overflow-hidden">

    <!-- Background Parallax Text - Similar to Hero -->
    <div class="mes-background" [style.transform]="'translateX(' + (-scrollOffset * -1) + 'px)'">
        <span class="parallax-text">MES</span>
    </div>
    <div class="projets-background" [style.transform]="'translateX(' + (scrollOffset * -0.4) + 'px)'">
        <span class="parallax-text">PROJETS</span>
    </div>

    <div class="max-w-7xl w-full px-4 md:px-8 relative z-10">

        <h2 class="section-title">Mes Projets</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-16">
            <div *ngFor="let project of projects; let i = index" class="project-wrapper"
                [ngClass]="i % 2 === 0 ? 'from-left' : 'from-right'" [style.transition-delay]="(i * 150) + 'ms'">

                <div class="project-card">
                    <!-- Dynamic Pastel Background Glow -->
                    <div class="card-accent" [style.background]="project.accentColor"></div>

                    <!-- Image Showcase -->
                    <div class="project-image-container">
                        <img [src]="project.imageUrl" [alt]="project.title" class="project-image">
                        <div class="image-overlay">
                            <div class="project-links-overlay">
                                <a *ngIf="project.githubUrl" [href]="project.githubUrl" target="_blank"
                                    class="overlay-link" title="Source Code">
                                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                                    </svg>
                                </a>
                                <a *ngIf="project.demoUrl" [href]="project.demoUrl" target="_blank" class="overlay-link"
                                    title="Live Demo">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Project Info -->
                    <div class="project-info">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="project-title-new">{{project.title}}</h3>
                            <div class="accent-dot" [style.background]="project.accentColor"></div>
                        </div>
                        <p class="project-desc-new">{{project.description}}</p>

                        <div class="project-tags-new">
                            <span *ngFor="let tech of project.technologies" class="project-tag-new">
                                {{tech}}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- View More Button -->
        <div class="view-more-container mt-20">
            <a href="https://github.com/kibagami-nc" target="_blank" class="github-btn">
                <span>Voir plus sur GitHub</span>
                <svg class="github-icon" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
                <div class="btn-glow"></div>
            </a>
        </div>
    </div>
</section>
