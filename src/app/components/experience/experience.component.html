<section id="experience" class="w-full py-20 flex flex-col items-center justify-center relative overflow-hidden">
    <div class="max-w-6xl w-full px-4 md:px-8">

        <h2 class="section-title scroll-trigger" appScrollTrigger>Parcours</h2>

        <div class="grid md:grid-cols-2 gap-12 mt-12">

            <!-- Education Column -->
            <div class="flex flex-col gap-6">
                <h3 class="column-title scroll-trigger" appScrollTrigger>
                    <span class="icon-wrapper">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 14l9-5-9-5-9 5 9 5z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222">
                            </path>
                        </svg>
                    </span>
                    Formations
                </h3>

                <div *ngFor="let item of education; let i = index" class="exp-card scroll-trigger" appScrollTrigger
                    [style.transition-delay]="(i * 50) + 'ms'">
                    <div class="exp-date">{{item.date}}</div>
                    <h4 class="exp-title">{{item.title}}</h4>
                    <div class="exp-org">{{item.organization}}</div>
                    <p class="exp-desc">{{item.description}}</p>
                    <div class="exp-tags" *ngIf="item.tags">
                        <span *ngFor="let tag of item.tags" class="exp-tag">{{tag}}</span>
                    </div>
                </div>
            </div>

            <!-- Experience Column -->
            <div class="flex flex-col gap-6">
                <h3 class="column-title scroll-trigger" appScrollTrigger style="transition-delay: 200ms;">
                    <span class="icon-wrapper">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                    </span>
                    Expériences
                </h3>

                <div *ngFor="let item of experience; let i = index" class="exp-card scroll-trigger" appScrollTrigger
                    [class.has-links]="item.extraLinks" [style.transition-delay]="(i * 50 + 100) + 'ms'">
                    <div class="exp-date">{{item.date}}</div>
                    <h4 class="exp-title">{{item.title}}</h4>
                    <div class="exp-org">{{item.organization}}</div>
                    <p class="exp-desc">{{item.description}}</p>
                    <div class="exp-tags" *ngIf="item.tags">
                        <span *ngFor="let tag of item.tags" class="exp-tag">{{tag}}</span>
                    </div>

                    <!-- Simplified Link Row -->
                    <div class="exp-ext-links" *ngIf="item.extraLinks">
                        <a *ngFor="let link of item.extraLinks" [href]="link.url" target="_blank" class="ext-link">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                            {{link.label}}
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
